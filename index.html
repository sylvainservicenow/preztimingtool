<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrezTimingTool — Slide Timing Planner</title>
<meta name="description" content="Plan and fine-tune your presentation slide timing with an intuitive visual timeline.">
<meta property="og:title" content="PrezTimingTool">
<meta property="og:description" content="Free visual tool to plan presentation slide timing. Drag, adjust, compare variants.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(window.pdfjsLib){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';window._pdfjs=window.pdfjsLib;}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf5ef;--sf:#fff;--sa:#fdf8f3;--bd:#ece4d9;--bl:#f2ebe2;
  --tx:#3a3028;--tm:#78695a;--td:#b0a292;
  --ac:#7c5cf5;--al:#9b82f8;--ab:#f3efff;--abr:#d9cffc;
  --coral:#ef6461;--green:#4caf50;--gold:#f5a623;
  --sh:0 1px 3px rgba(55,35,15,.05),0 4px 14px rgba(55,35,15,.07);
  --shl:0 6px 24px rgba(55,35,15,.1),0 16px 48px rgba(55,35,15,.08);
  --r:12px;--rs:8px;
  --f:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
  --m:'JetBrains Mono','SF Mono',monospace;
}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:var(--f);cursor:pointer;border:none;background:none}
input{font-family:var(--f);color:var(--tx)}
input:focus{border-color:var(--ac)!important;outline:none}
button:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
::-webkit-scrollbar{height:8px}
::-webkit-scrollbar-track{background:var(--bl);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

/* ── Layout ── */
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.col{max-width:720px;width:100%;display:flex;flex-direction:column;gap:20px}
.card{background:var(--sf);border-radius:16px;padding:32px;box-shadow:var(--sh);border:1px solid var(--bl)}
.row{display:flex;gap:12px}
.fg{margin-bottom:16px;display:flex;flex-direction:column;flex:1}
.fl{font-size:12px;font-weight:700;color:var(--td);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.fi{background:var(--sa);border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--tx);width:100%;box-sizing:border-box}
.fi-sm{padding:5px 10px;font-size:13px}
.fi-mono{font-family:var(--m);font-weight:600;text-align:center}

/* ── Buttons ── */
.bp{background:linear-gradient(135deg,var(--ac),var(--al));color:#fff;border-radius:10px;padding:11px 28px;font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(124,92,245,.3);transition:transform .1s}
.bp:hover{transform:translateY(-1px)}
.bs{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.bs:hover{background:var(--sa)}
.bk{color:var(--tm);font-size:14px;display:flex;align-items:center;gap:2px;font-weight:600;padding:0}
.bk:hover{color:var(--tx)}
.bi{color:var(--td);padding:4px;border-radius:6px;display:flex}
.bi:hover{color:var(--tx);background:var(--sa)}
.bt{background:none;border:1.5px solid var(--bd);border-radius:var(--rs);padding:8px 14px;color:var(--tx);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;transition:background .15s}
.bt:hover{background:var(--sa)}
.bt[disabled]{opacity:.35;pointer-events:none}
.bt .bt-label{font-size:12px;font-weight:600}
.bd{background:var(--sa);border:1.5px solid var(--bd);border-radius:var(--rs);padding:7px 12px;display:flex;align-items:center;gap:4px;color:var(--tm);font-size:13px;font-weight:600}
.bd:hover{background:var(--bl)}
.pill{background:var(--sa);border:1.5px solid var(--bd);border-radius:var(--rs);padding:8px 16px;font-size:13px;font-weight:600;color:var(--tx)}
.pill.active{background:var(--ab);border-color:var(--ac);color:var(--ac)}
.sec-l{font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.prev{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--ab);border-radius:10px;margin-bottom:20px;font-family:var(--m);font-size:13px;color:var(--ac);font-weight:500;border:1px solid var(--abr)}
.badge{font-size:14px;font-weight:600;font-family:var(--m);color:var(--ac);background:var(--ab);padding:4px 10px;border-radius:8px;display:inline-block}
.badge-d{font-size:14px;font-weight:500;color:var(--td);background:var(--sa);padding:4px 10px;border-radius:8px;border:1px solid var(--bd);display:inline-block}

/* ── Home ── */
.hero-icon{font-size:64px;margin-bottom:8px;animation:sttFloat 3s ease-in-out infinite}
@keyframes sttFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-t{font-size:36px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--ac),#ff8a65);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-s{font-size:16px;color:var(--tm);margin:6px 0 0;font-weight:500}
.plan-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--sf);border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid var(--bl);cursor:pointer;transition:transform .15s}
.plan-row:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.plan-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--ac);flex-shrink:0}
.hid-pill{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:6px 14px;font-size:13px;color:var(--td);display:flex;align-items:center;gap:6px}
.hid-pill:hover{background:var(--sa)}

/* ── Editor ── */
.ed-page{min-height:100vh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:16px;padding:14px 28px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bl);position:sticky;top:0;z-index:100}
.top-nm{background:none;border:none;color:var(--tx);font-size:22px;font-weight:800;font-family:var(--f);outline:none;flex:1;min-width:0}
.var-area{padding:24px 28px;display:flex;flex-direction:column;gap:20px;flex:1;overflow:auto}
.v-row{background:var(--sf);border-radius:16px;box-shadow:var(--sh);border:1.5px solid transparent;overflow:hidden;transition:border-color .2s}
.v-row.active{border-color:var(--ac);box-shadow:0 0 0 1px var(--abr),var(--sh)}
.v-head{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--sa);border-bottom:1px solid var(--bl);cursor:pointer}
.v-nm{background:none;border:none;color:var(--tx);font-size:16px;font-weight:700;font-family:var(--f);outline:none;width:150px}

/* ── Timeline ── */
.tl-out{padding:12px 20px 14px;overflow-x:auto;overflow-y:hidden}
.tl-inner{display:inline-flex;flex-direction:column;min-width:100%}
.tl-grid{min-width:100%}
.tl-mk{position:relative;height:26px;margin-bottom:4px}
.tl-mk-l{font-size:11px;color:var(--td);font-family:var(--m);font-weight:500;margin-top:2px}
.sl{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 8px;background:var(--sf);border-radius:12px;border:1.5px solid var(--bd);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;overflow:hidden;position:relative;min-height:140px;box-sizing:border-box;user-select:none}
.sl.sel{border-color:var(--ac);background:var(--ab);box-shadow:0 0 0 2px var(--abr)}
.sl.zero{background:var(--sa);opacity:.4;min-width:8px;max-width:8px;padding:0;border-radius:4px;display:flex;align-items:center;justify-content:center}
.sl-grip{position:absolute;top:6px;left:4px;cursor:grab;color:var(--td)}
.sl-n{font-size:24px;font-weight:800;color:var(--ac);line-height:1}
.sl-l{font-size:12px;color:var(--tm);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;min-height:16px}
.sl-d{font-size:14px;font-family:var(--m);color:var(--tx);font-weight:600}
.sl-c{font-size:11px;font-family:var(--m);color:var(--td);font-weight:500}
.sl-thumb{width:92%;max-width:100px;aspect-ratio:16/9;border-radius:5px;object-fit:cover;border:1px solid var(--bd);margin:3px 0}
.pptx-drop{border:2px dashed var(--bd);border-radius:12px;padding:24px;text-align:center;transition:border-color .2s,background .2s;cursor:pointer}
.pptx-drop:hover,.pptx-drop.over{border-color:var(--ac);background:var(--ab)}
.pptx-preview{display:flex;gap:8px;overflow-x:auto;padding:12px 0;margin-top:12px}
.pptx-thumb{width:80px;flex-shrink:0;border-radius:6px;overflow:hidden;border:1.5px solid var(--bd);background:var(--sf)}
.pptx-thumb img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.pptx-thumb-label{font-size:9px;padding:2px 4px;color:var(--td);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.div-h{width:18px;cursor:col-resize;display:flex;align-items:center;justify-content:center;z-index:10;flex-shrink:0;position:relative}
.div-l{width:2px;height:50%;border-radius:2px;background:var(--bd);transition:background .15s,width .15s}
.div-h:hover .div-l,.div-l.dragging{background:var(--ac);width:3px}

/* ── Sections ── */
.sec-block{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;border:1.5px solid transparent;position:relative;min-width:60px;border-radius:8px}
.sec-block:first-child{border-radius:10px 0 0 10px}
.sec-block:last-of-type{border-radius:0 10px 10px 0}
.sec-block:only-of-type{border-radius:10px}
.sec-block:hover{filter:brightness(0.95)}
.sec-block.sel{border-color:var(--ac);box-shadow:0 0 0 2px var(--abr);z-index:2}
.sec-block .sec-name{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.sec-block .sec-time{font-family:var(--m);font-size:13px;opacity:.7}
.sec-block .sec-slides{font-size:11px;opacity:.5}
.sec-split{width:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;position:relative;z-index:3}
.sec-split-btn{width:24px;height:24px;border-radius:6px;background:var(--sf);border:1.5px solid var(--bd);color:var(--td);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sec-split-btn:hover{border-color:var(--ac);color:var(--ac);transform:scale(1.1);box-shadow:0 2px 8px rgba(124,92,245,.2)}
.sec-det{padding:14px 20px;border-top:1px solid var(--bl);background:var(--sa);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.sec-colors-0{background:#e8f5e9;color:#2e7d32}.sec-colors-1{background:#e3f2fd;color:#1565c0}.sec-colors-2{background:#fff3e0;color:#e65100}.sec-colors-3{background:#f3e5f5;color:#7b1fa2}.sec-colors-4{background:#fce4ec;color:#c62828}.sec-colors-5{background:#e0f7fa;color:#00695c}.sec-colors-6{background:#fff8e1;color:#f57f17}.sec-colors-7{background:#efebe9;color:#4e342e}
/* Section split button between slides (bottom of cards) */
.div-h .sec-brk{display:none!important}
/* Home action cards */
.home-actions{display:flex;gap:8px;justify-content:center}
.home-act{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 10px;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;cursor:pointer;transition:all .15s;flex:1 1 0;min-width:0;max-width:140px;text-align:center}
.home-act:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:var(--sh)}
.home-act .ha-icon{font-size:24px}
.home-act .ha-label{font-size:12px;font-weight:700;color:var(--tx);white-space:nowrap}
.home-act .ha-sub{font-size:9px;color:var(--td);font-weight:500}

/* ── Detail ── */
.det-bar{padding:16px 20px;border-top:1px solid var(--bl);background:var(--sa);display:flex;align-items:center;gap:24px}
.det-bar .sl-big{font-size:32px;font-weight:800;color:var(--ac);line-height:1}
.det-bar input[type=range]{flex:1;accent-color:var(--ac);cursor:pointer;height:8px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--sf);border-radius:16px;padding:32px;min-width:400px;max-width:480px;box-shadow:var(--shl);border:1px solid var(--bl)}

/* ── Tooltip ── */
.tip-wrap{position:relative;display:inline-flex}
.tip{position:fixed;background:#3a3028;color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:99999;font-family:var(--f);box-shadow:0 2px 8px rgba(0,0,0,.25);transform:translateX(-50%)}

/* ── Utility ── */
.hidden{display:none!important}
.gap-6{gap:6px}.gap-8{gap:8px}
.flex{display:flex}.flex-col{flex-direction:column}.items-c{align-items:center}.justify-c{justify-content:center}.justify-e{justify-content:flex-end}
.flex-1{flex:1}.shrink-0{flex-shrink:0}
.text-c{text-align:center}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-20{margin-top:20px}.mt-32{margin-top:32px}
.mb-4{margin-bottom:4px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.w-full{width:100%}
/* Loading overlay */
.loading-ov{position:fixed;inset:0;background:rgba(250,245,239,.85);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:16px;font-weight:600;color:var(--tm)}
/* Lock indicator */
.sl-lock{position:absolute;top:4px;right:4px;font-size:10px;color:var(--gold);opacity:.8}
.sec-lock{font-size:11px;margin-left:4px;color:inherit;opacity:.6}
/* Slide hover preview */
.sl-preview{position:fixed;background:var(--sf);border-radius:12px;box-shadow:var(--shl);border:1px solid var(--bl);padding:10px;z-index:9998;pointer-events:none;display:none;max-width:360px}
.sl-preview img{width:100%;border-radius:8px;display:block;margin-bottom:6px}
.sl-preview .sl-prev-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:2px}
.sl-preview .sl-prev-info{font-size:12px;color:var(--td);font-family:var(--m)}
</style>
</head>

<script>
/* ═══════════════════════════════════════
   PrezTimingTool — Core Engine
   Vanilla JS, zero dependencies
   ═══════════════════════════════════════ */

const STEP=15,MAX_UNDO=20,MAX_SLIDES=50,MAX_LABEL=15;
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e};
const uid=()=>Math.random().toString(36).slice(2,10);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const round=v=>Math.round(v/STEP)*STEP;
const deep=o=>JSON.parse(JSON.stringify(o));
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const fmtD=s=>{if(!s)return'0s';const m=Math.floor(s/60),r=s%60;return m&&r?`${m}m ${r}s`:m?`${m}m`:`${r}s`};
const parseT=v=>{const c=v.trim();if(c.includes(':')){const p=c.split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0)}return parseInt(c)||0};
const COLORS=['#ffe0cc','#fff3cc','#d4f5d4','#cce8ff','#f0ccff','#ffe0e6','#ccf5f0'];

// SVG icons
const IC={
  plus:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,

  redo:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>`,
  save:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
  down:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  gear:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,

// ─── State ───
let state={screen:'home',plans:[],curPlan:null,actVId:null,selId:null,selSecId:null,hist:[],fut:[],dragId:null,fileHandle:null};

function mkSlide(d,label,thumb){return{id:uid(),duration:d,label:label||'',thumb:thumb||null,locked:false}}
function mkSection(name,startIdx,endIdx){return{id:uid(),name:name||'Section',startIdx,endIdx,locked:false}}
function initSlides(n,tot){const p=round(Math.floor(tot/n));const sl=Array.from({length:n},()=>mkSlide(p));const u=p*n;if(u<tot)sl[sl.length-1].duration+=tot-u;return sl}

// ─── Section operations ───
function getSections(v){return v.sections||[]}
function ensureSections(v){
  if(!v.sections||!v.sections.length){
    v.sections=[mkSection('Full Presentation',0,v.slides.length-1)];
  }
  return v.sections;
}

function splitSection(vid,secId,afterSlideIdx){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=ensureSections(v);
  const si=secs.findIndex(s=>s.id===secId);if(si<0)return;
  const sec=secs[si];
  if(afterSlideIdx<sec.startIdx||afterSlideIdx>=sec.endIdx)return; // can't split at edges
  pushUndo();
  const oldEnd=sec.endIdx;
  sec.endIdx=afterSlideIdx;
  secs.splice(si+1,0,mkSection('Section '+(secs.length+1),afterSlideIdx+1,oldEnd));
  render();
}

function mergeSections(vid,secId){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=ensureSections(v);
  if(secs.length<=1)return;
  const si=secs.findIndex(s=>s.id===secId);if(si<0)return;
  pushUndo();
  if(si>0){
    // Merge this section into the one on the left
    secs[si-1].endIdx=secs[si].endIdx;
    secs.splice(si,1);
  }else{
    // First section: merge with the one on the right
    secs[si].endIdx=secs[si+1].endIdx;
    secs.splice(si+1,1);
  }
  if(state.selSecId===secId)state.selSecId=null;
  render();
}

function removeSectionBreak(vid,secId){mergeSections(vid,secId)}

function addSectionBreak(vid,afterSlideIdx){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=ensureSections(v);
  // Find which section contains this slide
  for(let i=0;i<secs.length;i++){
    if(afterSlideIdx>=secs[i].startIdx&&afterSlideIdx<secs[i].endIdx){
      splitSection(vid,secs[i].id,afterSlideIdx);
      return;
    }
  }
}

function setSectionDuration(vid,secId,newDur){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=ensureSections(v);
  const sec=secs.find(s=>s.id===secId);if(!sec)return;
  if(sec.locked)return; // Can't change locked section
  const slideCount=sec.endIdx-sec.startIdx+1;
  if(slideCount<=0)return;
  // Count unlocked slides in this section
  let unlockedCount=0;
  for(let i=sec.startIdx;i<=sec.endIdx;i++){if(!v.slides[i].locked)unlockedCount++}
  if(unlockedCount===0)return; // All slides locked
  const minDur=STEP*slideCount;
  newDur=round(clamp(newDur,minDur,v.totalDuration));
  let curTotal=0;
  for(let i=sec.startIdx;i<=sec.endIdx;i++)curTotal+=v.slides[i].duration;
  const diff=newDur-curTotal;if(diff===0)return;
  pushUndo();
  // Distribute among unlocked slides only
  let lockedTotal=0;
  for(let i=sec.startIdx;i<=sec.endIdx;i++){if(v.slides[i].locked)lockedTotal+=v.slides[i].duration}
  const unlockDur=newDur-lockedTotal;
  const perSlide=Math.max(STEP,round(Math.floor(unlockDur/unlockedCount)));
  let rem=unlockDur-perSlide*unlockedCount;
  for(let i=sec.startIdx;i<=sec.endIdx;i++){
    if(v.slides[i].locked)continue;
    v.slides[i].duration=Math.max(STEP,perSlide+(rem!==0?(rem>0?((rem-=STEP,STEP)):0):0));
  }
  // Fix remainder on last unlocked slide
  let actualTotal=0;for(let i=sec.startIdx;i<=sec.endIdx;i++)actualTotal+=v.slides[i].duration;
  const finalDiff=newDur-actualTotal;
  if(finalDiff!==0){for(let i=sec.endIdx;i>=sec.startIdx;i--){if(!v.slides[i].locked){v.slides[i].duration=Math.max(STEP,v.slides[i].duration+finalDiff);break}}}
  // Give/take from adjacent unlocked section
  const secIdx=secs.indexOf(sec);
  let adjIdx=-1;
  // Find next unlocked section, then try previous
  for(let j=secIdx+1;j<secs.length;j++){if(!secs[j].locked){adjIdx=j;break}}
  if(adjIdx<0){for(let j=secIdx-1;j>=0;j--){if(!secs[j].locked){adjIdx=j;break}}}
  if(adjIdx>=0){
    const adjSec=secs[adjIdx];
    if(diff>0){
      let r=diff;
      for(let i=adjSec.startIdx;i<=adjSec.endIdx&&r>0;i++){
        if(v.slides[i].locked)continue;
        const take=Math.min(Math.max(v.slides[i].duration-STEP,0),r);
        v.slides[i].duration-=take;r-=take;
      }
    }else{
      let unl=0;for(let i=adjSec.startIdx;i<=adjSec.endIdx;i++){if(!v.slides[i].locked)unl++}
      if(unl>0){
        const give=Math.abs(diff);const perAdj=round(Math.floor(give/unl));const remAdj=give-perAdj*unl;let last=-1;
        for(let i=adjSec.startIdx;i<=adjSec.endIdx;i++){if(!v.slides[i].locked){v.slides[i].duration+=perAdj;last=i}}
        if(last>=0)v.slides[last].duration+=remAdj;
      }
    }
  }
  render();
}

function renameSec(vid,secId,name){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const sec=ensureSections(v).find(s=>s.id===secId);
  if(sec)sec.name=name.slice(0,20);
}

function toggleSlideLock(vid,sid){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const s=v.slides.find(x=>x.id===sid);if(s)s.locked=!s.locked;
  render();
}

function toggleSectionLock(vid,secId){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const sec=ensureSections(v).find(s=>s.id===secId);if(!sec)return;
  sec.locked=!sec.locked;
  // Also lock/unlock all slides in the section
  for(let i=sec.startIdx;i<=sec.endIdx;i++){v.slides[i].locked=sec.locked}
  render();
}

function reorderSection(vid,fromSecId,toSecId){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=ensureSections(v);
  const fi=secs.findIndex(s=>s.id===fromSecId);
  const ti=secs.findIndex(s=>s.id===toSecId);
  if(fi<0||ti<0||fi===ti)return;
  pushUndo();
  // Extract slides belonging to the from-section
  const fromSec=secs[fi];
  const movedSlides=v.slides.splice(fromSec.startIdx,fromSec.endIdx-fromSec.startIdx+1);
  // Recalculate target position after splice
  const toSec=secs[ti];
  const insertIdx=fi<ti?toSec.endIdx-movedSlides.length+1:toSec.startIdx;
  v.slides.splice(insertIdx,0,...movedSlides);
  // Rebuild section indices
  const[movedSecDef]=secs.splice(fi,1);
  const newTi=fi<ti?ti-1:ti;
  secs.splice(newTi,0,movedSecDef);
  // Fix all indices
  let idx=0;
  secs.forEach(sec=>{
    const count=sec.endIdx-sec.startIdx+1;
    sec.startIdx=idx;sec.endIdx=idx+count-1;
    idx+=count;
  });
  render();
}

// Fix section indices after slide add/remove/reorder
function fixSectionIndices(v){
  const secs=getSections(v);if(!secs.length)return;
  const total=v.slides.length;
  // Ensure sections cover all slides and indices are valid
  secs.forEach(s=>{s.startIdx=clamp(s.startIdx,0,total-1);s.endIdx=clamp(s.endIdx,s.startIdx,total-1)});
  // Make contiguous
  for(let i=1;i<secs.length;i++){secs[i].startIdx=secs[i-1].endIdx+1}
  if(secs.length)secs[secs.length-1].endIdx=total-1;
  // Remove empty sections
  for(let i=secs.length-1;i>=0;i--){if(secs[i].startIdx>secs[i].endIdx)secs.splice(i,1)}
}

// ─── PPTX Parser (titles + sections, no thumbnails) ───
async function parsePptx(file){
  if(typeof JSZip==='undefined'){alert('JSZip not loaded. Check internet connection.');return null}
  try{
    const zip=await JSZip.loadAsync(file);
    const slideFiles=[];
    zip.forEach((path)=>{if(/^ppt\/slides\/slide\d+\.xml$/.test(path))slideFiles.push({path,num:parseInt(path.match(/slide(\d+)/)[1])})});
    slideFiles.sort((a,b)=>a.num-b.num);
    if(!slideFiles.length){alert('No slides found in this file.');return null}
    // Detect hidden slides: <p:sld show="0"> means hidden
    const visibleSlides=[];
    const titles=[];
    for(const sf of slideFiles){
      const xml=await zip.file(sf.path).async('text');
      // Check if slide is hidden (show="0" on the root <p:sld> element)
      const isHidden=/^<\?xml[^?]*\?>\s*<p:sld[^>]*\bshow\s*=\s*"0"/i.test(xml);
      if(isHidden)continue; // Skip hidden slides
      visibleSlides.push(sf);
      let title='';
      const titleMatch=xml.match(/<p:sp>[\s\S]*?<p:ph[^>]*type="title"[\s\S]*?<\/p:sp>/i)||xml.match(/<p:sp>[\s\S]*?<p:ph[^>]*type="ctrTitle"[\s\S]*?<\/p:sp>/i);
      if(titleMatch){const texts=titleMatch[0].match(/<a:t>([^<]*)<\/a:t>/g);if(texts)title=texts.map(t=>t.replace(/<\/?a:t>/g,'')).join(' ').trim()}
      if(!title){const ft=xml.match(/<a:t>([^<]+)<\/a:t>/);if(ft)title=ft[1].trim().slice(0,30)}
      titles.push(title.slice(0,MAX_LABEL));
    }
    const slideCount=visibleSlides.length;
    if(!slideCount){alert('No visible slides found in this file.');return null}
    const skipped=slideFiles.length-slideCount;
    if(skipped>0)console.log(`Skipped ${skipped} hidden slide(s)`);
    // Extract sections from presentation.xml
    const sections=[];
    const presFile=zip.file('ppt/presentation.xml');
    if(presFile){
      const presXml=await presFile.async('text');
      const secMatches=[...presXml.matchAll(/<p14:section[^>]*name="([^"]*)"[^>]*>[\s\S]*?<\/p14:section>/gi)];
      if(secMatches.length){
        // Note: section slide counts may include hidden slides, so we recalculate
        let idx=0;
        secMatches.forEach(m=>{
          const name=m[1]||'Section';
          const slideIds=[...m[0].matchAll(/<p14:sldId[^>]*id="([^"]*)"[^>]*/gi)];
          // Count only visible slides in this section (approximate: use proportional distribution)
          if(slideIds.length&&idx<slideCount){
            const visCount=Math.min(slideIds.length,slideCount-idx);
            sections.push({name:name.slice(0,20),slideCount:visCount});
            idx+=visCount;
          }
        });
      }
    }
    return{slideCount,titles,thumbs:new Array(slideCount).fill(null),sections,hiddenSkipped:skipped};
  }catch(e){console.error('PPTX parse error:',e);alert('Could not parse this PPTX file.');return null}
}

// ─── PDF Parser (renders real slide thumbnails + extracts titles) ───
async function parsePdf(file){
  const pdfjsLib=window._pdfjs;
  if(!pdfjsLib){alert('PDF renderer not loaded yet. Please wait a moment and try again.');return null}
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const slideCount=pdf.numPages;
    if(!slideCount){alert('No pages found in this PDF.');return null}
    const thumbs=[];const titles=[];
    const TW=320;
    for(let i=1;i<=slideCount;i++){
      try{
        const page=await pdf.getPage(i);
        // Render thumbnail
        const vp=page.getViewport({scale:1});
        const scale=TW/vp.width;
        const svp=page.getViewport({scale});
        const canvas=document.createElement('canvas');
        canvas.width=svp.width;canvas.height=svp.height;
        await page.render({canvasContext:canvas.getContext('2d'),viewport:svp}).promise;
        thumbs.push(canvas.toDataURL('image/jpeg',0.7));
        // Extract title (first text line, usually the slide title)
        try{
          const tc=await page.getTextContent();
          const firstLine=tc.items.filter(it=>it.str.trim()).slice(0,3).map(it=>it.str.trim()).join(' ');
          titles.push(firstLine.slice(0,MAX_LABEL));
        }catch(e){titles.push('')}
      }catch(e){console.warn('Could not render page',i,e);thumbs.push(null);titles.push('')}
    }
    return{slideCount,titles,thumbs};
  }catch(e){console.error('PDF parse error:',e);alert('Could not parse this PDF.');return null}
}

window._importData=null; // Holds parsed import data during create flow

// ─── File I/O (File System Access API — Chrome native) ───
async function saveFile(data){
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  try{
    if(!state.fileHandle){
      state.fileHandle=await window.showSaveFilePicker({suggestedName:`${data.name||'plan'}.json`,types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    }
    const w=await state.fileHandle.createWritable();
    await w.write(blob);
    await w.close();
    return true;
  }catch(e){
    if(e.name==='AbortError')return false;
    state.fileHandle=null;
    // Fallback download
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${data.name||'plan'}.json`;a.click();URL.revokeObjectURL(a.href);
    return true;
  }
}

function openFile(){
  return new Promise(res=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=()=>{
      const f=inp.files&&inp.files[0];if(!f){res(null);return}
      const reader=new FileReader();
      reader.onload=()=>{try{res(JSON.parse(reader.result))}catch{alert('Invalid file');res(null)}};
      reader.readAsText(f);
    };
    inp.click();
  });
}

function exportTiming(name,v){
  const secs=getSections(v);
  let c=0;const ln=[`Plan: ${name} — Variant: ${v.name}`,`Total Duration: ${fmt(v.totalDuration)}`,''];
  if(secs.length>1){
    ln.push('--- Sections ---');
    secs.forEach(sec=>{
      let secEnd=0;for(let i=0;i<=sec.endIdx;i++)secEnd+=v.slides[i].duration;
      ln.push(`${sec.name}: ${fmt(secEnd)}`);
    });
    ln.push('');
  }
  ln.push('--- Slides ---');
  v.slides.forEach((s,i)=>{c+=s.duration;ln.push(`Slide ${String(i+1).padStart(2,' ')}${s.label?' - '+s.label:''}: ${fmt(c)}`)});
  const txt=ln.join('\n');
  const ov=el('div','overlay');
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal" style="min-width:480px;max-width:600px">
    <h3 style="font-size:20px;font-weight:800;margin:0 0 4px">Timing Sheet</h3>
    <p style="font-size:13px;color:var(--td);margin:0 0 16px">Copy the timing breakdown below</p>
    <textarea id="export-txt" readonly style="width:100%;height:320px;font-family:var(--m);font-size:13px;padding:12px;border:1.5px solid var(--bd);border-radius:10px;background:var(--sa);color:var(--tx);resize:vertical;line-height:1.6">${esc(txt)}</textarea>
    <div class="flex gap-8 justify-e" style="margin-top:16px">
      <button class="bs" onclick="this.closest('.overlay').remove()">Close</button>
      <button class="bp" onclick="navigator.clipboard.writeText(document.getElementById('export-txt').value);this.textContent='Copied!';setTimeout(()=>this.textContent='Copy to Clipboard',1500)">Copy to Clipboard</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  // Auto-select all text
  setTimeout(()=>{const ta=$('#export-txt');if(ta){ta.focus();ta.select()}},100);
}

// ─── Undo/Redo ───
function pushUndo(){
  state.hist=[...state.hist.slice(-(MAX_UNDO-1)),deep(state.curPlan.variants)];
  state.fut=[];
}
function undo(){
  if(!state.hist.length)return;
  state.fut=[deep(state.curPlan.variants),...state.fut.slice(0,MAX_UNDO-1)];
  state.curPlan.variants=state.hist.pop();
  render();
}
function redo(){
  if(!state.fut.length)return;
  state.hist.push(deep(state.curPlan.variants));
  state.curPlan.variants=state.fut.shift();
  render();
}

// ─── Slide ops ───
function getAV(){return state.curPlan?.variants.find(v=>v.id===state.actVId)||state.curPlan?.variants.find(v=>!v.hidden)||state.curPlan?.variants[0]}

function setDur(vid,sid,nd){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const sl=[...v.slides];const i=sl.findIndex(x=>x.id===sid);if(i<0)return;
  if(sl[i].locked)return; // Can't change locked slide
  nd=round(clamp(nd,STEP,v.totalDuration));const d=nd-sl[i].duration;if(!d)return;
  pushUndo();sl[i]={...sl[i],duration:nd};
  if(d>0){let r=d;for(let j=i+1;j<sl.length&&r>0;j++){if(sl[j].locked)continue;const tk=Math.min(Math.max(sl[j].duration-STEP,0),r);sl[j]={...sl[j],duration:sl[j].duration-tk};r-=tk}if(r>0)sl[i]={...sl[i],duration:nd-r}}
  else{for(let j=i+1;j<sl.length;j++){if(sl[j].locked)continue;sl[j]={...sl[j],duration:sl[j].duration+(-d)};break}}
  v.slides=sl;render();
}

function addSlideAfter(vid,ai){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v||v.slides.length>=MAX_SLIDES)return;
  pushUndo();const sl=[...v.slides];const p=sl[ai];const tk=p?round(Math.floor(p.duration/2)):STEP;
  if(p)sl[ai]={...p,duration:p.duration-tk};sl.splice(ai+1,0,mkSlide(tk));v.slides=sl;
  // Adjust section indices
  const secs=getSections(v);secs.forEach(s=>{if(s.endIdx>=ai+1)s.endIdx++;if(s.startIdx>ai)s.startIdx++});
  fixSectionIndices(v);render();
}

function addSlideEnd(vid){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v||v.slides.length>=MAX_SLIDES)return;
  pushUndo();const sl=[...v.slides];const l=sl[sl.length-1];const tk=l?round(Math.floor(l.duration/2)):STEP;
  if(l)sl[sl.length-1]={...l,duration:l.duration-tk};sl.push(mkSlide(tk));v.slides=sl;
  const secs=getSections(v);if(secs.length)secs[secs.length-1].endIdx=v.slides.length-1;
  render();
}

function rmSlide(vid,sid){
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v||v.slides.length<=1)return;
  pushUndo();const sl=[...v.slides];const i=sl.findIndex(x=>x.id===sid);if(i<0)return;
  const rm=sl[i];sl.splice(i,1);const t=i>0?i-1:0;sl[t]={...sl[t],duration:sl[t].duration+rm.duration};
  v.slides=sl;if(state.selId===sid)state.selId=null;
  fixSectionIndices(v);render();
}

function reorderSlide(vid,fromId,toId){
  if(!fromId||fromId===toId)return;const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  pushUndo();const sl=[...v.slides];const fi=sl.findIndex(x=>x.id===fromId);const ti=sl.findIndex(x=>x.id===toId);
  if(fi<0||ti<0)return;const[mv]=sl.splice(fi,1);sl.splice(ti,0,mv);v.slides=sl;state.dragId=null;
  fixSectionIndices(v);render();
}

// ─── Variant ops ───
function cloneVariant(vid){
  pushUndo();const src=state.curPlan.variants.find(v=>v.id===vid);if(!src)return;
  const c={...deep(src),id:uid(),name:src.name+' (copy)',hidden:false};
  const i=state.curPlan.variants.findIndex(v=>v.id===vid);
  state.curPlan.variants.splice(i+1,0,c);state.actVId=c.id;render();
}

let hideConfirm=null;
function toggleHide(vid){
  if(hideConfirm===vid){
    pushUndo();const v=state.curPlan.variants.find(x=>x.id===vid);v.hidden=!v.hidden;hideConfirm=null;
    if(state.actVId===vid&&v.hidden){const vis=state.curPlan.variants.find(x=>x.id!==vid&&!x.hidden);if(vis)state.actVId=vis.id}
    render();
  }else{hideConfirm=vid;render();setTimeout(()=>{hideConfirm=null;render()},3000)}
}

function renderTimelineWithSections(v,isAct,dm){
  const sl=v.slides,tot=v.totalDuration;
  let cum=0;const pos=sl.map(s=>{const st=cum;cum+=s.duration;return{st,end:cum,pct:tot>0?(s.duration/tot)*100:0}});
  const ms=tot<=120?30:tot<=300?60:tot<=900?120:300;
  const secs=ensureSections(v);
  const N=sl.length;
  
  // CSS Grid: 2*N-1 columns. Odd columns = slides (fr units by duration). Even columns = dividers (18px).
  // Row 1: time markers (spans all)
  // Row 2: slides + dividers
  // Row 3: sections (span multiple columns)
  const colDefs=[];
  sl.forEach((s,i)=>{
    colDefs.push(`minmax(60px,${s.duration||1}fr)`);
    if(i<N-1)colDefs.push('18px');
  });
  
  let h=`<div class="tl-out"><div class="tl-grid" style="display:grid;grid-template-columns:${colDefs.join(' ')};grid-template-rows:auto auto auto;gap:0" data-vid="${v.id}">`;
  
  // Row 1: Time markers (span all columns)
  h+=`<div class="tl-mk" style="grid-column:1/-1;grid-row:1">`;
  for(let t=0;t<=tot;t+=ms){
    h+=`<div style="position:absolute;left:${(t/tot)*100}%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center"><div style="width:1px;height:6px;background:var(--bd)"></div><span class="tl-mk-l">${fmt(t)}</span></div>`;
  }
  h+=`</div>`;
  
  // Row 2: Slides and dividers
  sl.forEach((s,i)=>{
    const col=i*2+1; // 1-based grid column
    const z=s.duration===0;const sel=s.id===state.selId&&isAct;
    const dk=v.id+'-'+i;const diff=dm.get(dk);
    let bg='';if(diff==='more')bg='background:rgba(76,175,80,0.12);';if(diff==='less')bg='background:rgba(239,100,97,0.10);';
    if(sel)bg='background:var(--ab);';
    h+=`<div class="sl ${sel?'sel':''} ${z?'zero':''}" style="grid-column:${col};grid-row:2;${bg}" draggable="true"
      data-sid="${s.id}" data-vid="${v.id}"
      onclick="event.stopPropagation();state.actVId='${v.id}';state.selId='${s.id}';state.selSecId=null;render()"
      ondragstart="state.dragId='${s.id}'" ondragover="event.preventDefault()" ondrop="reorderSlide('${v.id}',state.dragId,'${s.id}')"
      data-tip="Slide ${i+1}${s.label?' \u2014 '+s.label:''} \u00b7 ${fmtD(s.duration)} \u00b7 ends ${fmt(pos[i].end)}">`;
    if(!z){
      h+=`<div class="sl-grip">${ic('grip')}</div>`;
      if(s.locked)h+=`<div class="sl-lock">🔒</div>`;
      h+=`<div class="sl-n">${i+1}</div>`;
      if(s.thumb)h+=`<img class="sl-thumb" src="${s.thumb}" alt="Slide ${i+1}" draggable="false">`;
      h+=`<div class="sl-l">${s.label||'<span style="opacity:.25">\u2014</span>'}</div>`;
      h+=`<div class="sl-d">${fmtD(s.duration)}</div>`;
      h+=`<div class="sl-c">${fmt(pos[i].end)}</div>`;
    }else{
      h+=`<div style="writing-mode:vertical-rl;font-size:9px;color:var(--td);font-weight:700">${i+1}</div>`;
    }
    h+=`</div>`;
    // Divider
    if(i<N-1){
      const divCol=i*2+2;
      const isBreak=secs.some(sec=>sec.endIdx===i);
      h+=`<div class="div-h" style="grid-column:${divCol};grid-row:2" data-div="${i}" data-vid="${v.id}" onmousedown="startDivDrag(event,'${v.id}',${i})" data-tip="Drag to redistribute time">
        <div class="div-l ${isBreak?'dragging':''}"></div>
      </div>`;
    }
  });
  
  // Row 3: Sections (span from startIdx column to endIdx column inclusive, accounting for dividers)
  if(secs.length){
    secs.forEach((sec,si)=>{
      let secDur=0;
      for(let i=sec.startIdx;i<=sec.endIdx;i++)secDur+=sl[i]?.duration||0;
      const isSel=state.selSecId===sec.id;
      const slideCount=sec.endIdx-sec.startIdx+1;
      const startCol=sec.startIdx*2+1;
      const endCol=sec.endIdx*2+1;
      // Section spans from startCol to endCol (inclusive), which in grid is startCol / endCol+1
      h+=`<div class="sec-block sec-colors-${si%8} ${isSel?'sel':''}" 
        style="grid-column:${startCol}/${endCol+1};grid-row:3;margin-top:8px;border-radius:10px${isAct?'':';opacity:0.7;cursor:default'}"
        ${isAct?`onclick="event.stopPropagation();state.selSecId='${sec.id}';state.selId=null;render()" draggable="true" ondragstart="state.dragSecId='${sec.id}'" ondragover="event.preventDefault()" ondrop="event.stopPropagation();reorderSection('${v.id}',state.dragSecId,'${sec.id}')"`:''} 
        data-tip="${esc(sec.name)} · ${slideCount} slide${slideCount!==1?'s':''} · ${fmtD(secDur)}${sec.locked?' · 🔒 Locked':''}">
        <span class="sec-name">${esc(sec.name)}</span>
        <span class="sec-time">${fmtD(secDur)}</span>
        <span class="sec-slides">(${slideCount})</span>
        ${sec.locked?'<span class="sec-lock">🔒</span>':''}
      </div>`;
      // Merge button in the divider column between sections (active variant only)
      if(isAct&&si<secs.length-1){
        const mergeCol=sec.endIdx*2+2;
        h+=`<div class="sec-split" style="grid-column:${mergeCol};grid-row:3;margin-top:8px" data-tip="Merge sections" onclick="event.stopPropagation();mergeSections('${v.id}','${secs[si+1].id}')">
          <div class="sec-split-btn">\u21d4</div>
        </div>`;
      }
    });
  }
  
  h+=`</div></div>`;
  return h;
}

function renderSecDetail(v){
  if(!state.selSecId)return '';
  const secs=ensureSections(v);
  const sec=secs.find(s=>s.id===state.selSecId);
  if(!sec)return '';
  let secDur=0;
  for(let i=sec.startIdx;i<=sec.endIdx;i++)secDur+=v.slides[i]?.duration||0;
  const slideCount=sec.endIdx-sec.startIdx+1;
  const canSplit=slideCount>1;
  const canMerge=secs.length>1;
  let h=`<div class="sec-det" onclick="event.stopPropagation()">
    <div style="min-width:140px">
      <label class="fl" style="margin-bottom:2px;display:block">Section name</label>
      <input class="fi fi-sm" value="${esc(sec.name)}" maxlength="20" oninput="renameSec('${v.id}','${sec.id}',this.value)" style="width:140px" title="Section name">
    </div>
    <div style="font-size:13px;color:var(--td);font-weight:500">Slides ${sec.startIdx+1}–${sec.endIdx+1} (${slideCount})</div>
    <div class="flex-1 flex items-c gap-8">
      <span class="fl" style="margin:0;min-width:58px">Duration</span>
      <input type="range" min="0" max="${v.totalDuration}" step="${STEP}" value="${secDur}" 
        oninput="setSectionDuration('${v.id}','${sec.id}',parseInt(this.value))" 
        title="Adjust section duration" style="flex:1;accent-color:var(--ac);height:8px">
      <input class="fi fi-sm fi-mono" id="sec-dur-input" value="${fmt(secDur)}" style="width:78px" onclick="event.stopPropagation();this.select()"
        onblur="commitSecDur('${v.id}','${sec.id}',this.value)" 
        onkeydown="if(event.key==='Enter'){this.blur()}" 
        title="Type section duration as mm:ss">
    </div>`;
  if(canSplit){
    h+=`<div class="flex items-c gap-6" style="border-left:1px solid var(--bd);padding-left:14px">
      <span class="fl" style="margin:0">Split after</span>`;
    for(let i=sec.startIdx;i<sec.endIdx;i++){
      h+=`<button class="bd" onclick="splitSection('${v.id}','${sec.id}',${i})" data-tip="Split after slide ${i+1}" style="padding:5px 8px;font-size:12px">${i+1}</button>`;
    }
    h+=`</div>`;
  }
  if(canMerge){
    h+=`<button class="bd" style="color:var(--coral)" onclick="mergeSections('${v.id}','${sec.id}')" data-tip="Merge with adjacent section">${ic('trash',14)} Merge</button>`;
  }
  h+=`<button class="bd" onclick="toggleSectionLock('${v.id}','${sec.id}')" data-tip="${sec.locked?'Unlock section':'Lock section duration'}" style="${sec.locked?'color:var(--gold)':''}">${sec.locked?'🔒 Locked':'🔓 Lock'}</button>`;
  h+=`</div>`;
  return h;
}


// ─── Divider drag ───
let divState=null;
function startDivDrag(e,vid,idx){
  e.preventDefault();e.stopPropagation();
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const track=e.target.closest('.tl-grid');if(!track)return;
  divState={vid,idx,startX:e.clientX,startDurs:v.slides.map(s=>s.duration),track,tot:v.totalDuration};
  document.body.style.cursor='col-resize';
  document.addEventListener('mousemove',onDivMove);
  document.addEventListener('mouseup',onDivUp);
}
function onDivMove(e){
  if(!divState)return;
  const{idx,startX,startDurs,track,tot}=divState;
  const tw=track.scrollWidth;const pps=tw/tot;
  const dx=e.clientX-startX;const ds=round(dx/pps);
  const oL=startDurs[idx],oR=startDurs[idx+1];
  const nL=clamp(oL+ds,STEP,oL+oR-STEP);
  // Visual preview via direct DOM (fast, no re-render)
  const blocks=track.querySelectorAll('.sl');
  if(blocks[idx])blocks[idx].querySelector('.sl-d').textContent=fmtD(nL);
  if(blocks[idx+1])blocks[idx+1].querySelector('.sl-d').textContent=fmtD(oL+oR-nL);
}
function onDivUp(e){
  document.removeEventListener('mousemove',onDivMove);
  document.removeEventListener('mouseup',onDivUp);
  document.body.style.cursor='';
  if(!divState)return;
  const{vid,idx,startX,startDurs,track,tot}=divState;
  const tw=track.scrollWidth;const pps=tw/tot;
  const dx=e.clientX-startX;const ds=round(dx/pps);
  divState=null;
  if(ds===0){render();return}
  const oL=startDurs[idx],oR=startDurs[idx+1];
  const nL=clamp(oL+ds,STEP,oL+oR-STEP);
  const v=state.curPlan.variants.find(x=>x.id===vid);
  if(!v)return;
  pushUndo();
  v.slides[idx].duration=nL;
  v.slides[idx+1].duration=oL+oR-nL;
  render();
}

// ─── Global funcs for HTML onclick ───
window.goHome=()=>{state.screen='home';state.fileHandle=null;render()};
window.goCreate=()=>{window._nn='';window._ns=10;window._nm=15;window._nc=0;window._importData=null;state.screen='create';render()};
window.pickFile=(accept)=>{
  const inp=document.createElement('input');inp.type='file';inp.accept=accept;
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(f)handleImportFile(f)};
  inp.click();
};
window.goComboImport=()=>{
  window._comboPdf=null;window._comboPptx=null;
  state.screen='combo';render();
};
window.pickComboFile=(type)=>{
  const accept=type==='pdf'?'.pdf':'.pptx';
  const inp=document.createElement('input');inp.type='file';inp.accept=accept;
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    if(type==='pdf')window._comboPdf=f;else window._comboPptx=f;
    renderCombo($('#app'));
  };
  inp.click();
};
window.processComboImport=async()=>{
  const pdfFile=window._comboPdf;const pptxFile=window._comboPptx;
  if(!pdfFile||!pptxFile)return;
  showLoading('Importing PDF...');
  try{
    const pdfData=await parsePdf(pdfFile);
    if(!pdfData){hideLoading();return}
    showLoading('Extracting sections from PPTX...');
    const pptxData=await parsePptx(pptxFile);
    if(!pptxData){hideLoading();return}
    if(pdfData.slideCount!==pptxData.slideCount){
      hideLoading();
      alert('Slide count mismatch!\n\nPDF: '+pdfData.slideCount+' slides\nPPTX: '+pptxData.slideCount+' slides\n\nPlease make sure both files are the same presentation.');
      return;
    }
    // Merge: PDF thumbnails + PPTX titles (prefer PPTX) + PPTX sections
    for(let i=0;i<pdfData.slideCount;i++){
      if(pptxData.titles[i])pdfData.titles[i]=pptxData.titles[i];
    }
    if(pptxData.sections&&pptxData.sections.length>0){
      pdfData.sections=pptxData.sections;
    }
    window._importData=pdfData;
    window._ns=pdfData.slideCount;
    window._nn=pdfFile.name.replace(/\.pdf$/i,'');
    window._nm=15;window._nc=0;
    state.screen='create';
    hideLoading();
    renderCreate($('#app'));
  }catch(e){hideLoading();console.error(e);alert('Import failed: '+e.message)}
};
window.handleImportFile=async(file)=>{
  const name=file.name.toLowerCase();
  showLoading('Importing '+(name.endsWith('.pdf')?'PDF':'PPTX')+'...');
  try{
    let data=null;
    if(name.endsWith('.pdf')){
      data=await parsePdf(file);
    }else if(name.endsWith('.pptx')){
      data=await parsePptx(file);
    }else{hideLoading();alert('Please select a .pdf or .pptx file');return}
    hideLoading();
    if(data){
      window._importData=data;
      window._ns=data.slideCount;
      window._nn=file.name.replace(/\.(pptx|pdf)$/i,'');
      if(state.screen==='home'){window._nm=15;window._nc=0;state.screen='create'}
      renderCreate($('#app'));
    }
  }catch(e){hideLoading();console.error(e);alert('Import failed: '+e.message)}
};
// Loading overlay
window.showLoading=(msg)=>{
  let ov=document.getElementById('loading-ov');
  if(!ov){ov=el('div','loading-ov');ov.id='loading-ov';document.body.appendChild(ov)}
  ov.innerHTML=`<div class="loading-spinner"></div><div class="loading-msg">${msg||'Loading...'}</div>`;
  ov.style.display='flex';
};
window.hideLoading=()=>{
  const ov=document.getElementById('loading-ov');
  if(ov)ov.style.display='none';
};
window.doCreate=()=>{
  const id=window._importData;
  const slideCount=id?id.slideCount:clamp(window._ns||10,1,MAX_SLIDES);
  const tot=(window._nm||15)*60+round(window._nc||0);if(tot<STEP)return;
  const per=round(Math.floor(tot/slideCount));
  const slides=[];
  for(let i=0;i<slideCount;i++){
    const dur=i===slideCount-1?tot-per*(slideCount-1):per;
    const label=id&&id.titles[i]?id.titles[i]:'';
    const thumb=id&&id.thumbs[i]?id.thumbs[i]:null;
    slides.push(mkSlide(dur,label,thumb));
  }
  // Build sections from import
  let sections=[];
  if(id&&id.sections&&id.sections.length>1){
    let idx=0;
    id.sections.forEach(s=>{
      const end=Math.min(idx+s.slideCount-1,slideCount-1);
      if(idx<=end)sections.push(mkSection(s.name,idx,end));
      idx=end+1;
    });
  }
  const plan={id:uid(),name:window._nn||'Untitled',createdAt:Date.now(),variants:[{id:uid(),name:'Default',slides,totalDuration:tot,hidden:false,sections}]};
  state.plans.push(plan);state.curPlan=plan;state.actVId=plan.variants[0].id;state.selId=null;state.selSecId=null;state.hist=[];state.fut=[];state.fileHandle=null;state.screen='editor';window._importData=null;render();
};
window.loadPlan=id=>{
  const p=state.plans.find(x=>x.id===id);if(!p)return;
  state.curPlan=deep(p);state.actVId=p.variants[0]?.id;state.selId=null;state.hist=[];state.fut=[];state.fileHandle=null;state.screen='editor';render();
};
window.delPlan=id=>{if(!confirm('Delete this plan permanently?'))return;state.plans=state.plans.filter(p=>p.id!==id);render()};
window.doImport=async()=>{const d=await openFile();if(d&&d.id&&d.variants){state.plans.push(d);state.curPlan=deep(d);state.actVId=d.variants[0]?.id;state.selId=null;state.hist=[];state.fut=[];state.fileHandle=null;state.screen='editor';render()}};
window.doSave=async()=>{
  const data=deep(state.curPlan);
  const ok=await saveFile(data);
  if(ok){
    // Also update local plans array
    const i=state.plans.findIndex(p=>p.id===data.id);
    if(i>=0)state.plans[i]=data;else state.plans.push(data);
  }
};
window.doExport=vid=>{const v=state.curPlan.variants.find(x=>x.id===vid);if(v)exportTiming(state.curPlan.name,v)};
window.setLabel=(vid,sid,l)=>{
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const s=v.slides.find(x=>x.id===sid);if(s)s.label=l.slice(0,MAX_LABEL);
};
window.commitDur=(vid,sid,val)=>{setDur(vid,sid,round(parseT(val)));render()};
window.openDurModal=()=>{
  const av=getAV();if(!av)return;
  const m=Math.floor(av.totalDuration/60),s=av.totalDuration%60;
  const ov=el('div','overlay');
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal">
    <h3 style="font-size:20px;font-weight:800;margin:0 0 4px">Adjust Total Duration</h3>
    <p style="font-size:14px;color:var(--td);margin:0 0 20px">Current: ${fmt(av.totalDuration)}</p>
    <div class="row mb-20">
      <div class="fg"><label class="fl">Minutes</label><input class="fi" type="number" id="dm-min" value="${m}" min="0"></div>
      <div class="fg"><label class="fl">Seconds</label><input class="fi" type="number" id="dm-sec" value="${s}" min="0" max="59" step="${STEP}"></div>
    </div>
    <label class="fl">Distribute the difference</label>
    <div class="flex gap-8" style="margin:8px 0 24px">
      <button class="pill active" id="dm-eq" onclick="this.classList.add('active');document.getElementById('dm-last').classList.remove('active')">Equally across all</button>
      <button class="pill" id="dm-last" onclick="this.classList.add('active');document.getElementById('dm-eq').classList.remove('active')">Add to last slide</button>
    </div>
    <div class="flex gap-8 justify-e">
      <button class="bs" onclick="this.closest('.overlay').remove()">Cancel</button>
      <button class="bp" onclick="applyDurModal()">Apply</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
};
window.applyDurModal=()=>{
  const av=getAV();if(!av)return;
  const nt=(parseInt($('#dm-min').value)||0)*60+round(parseInt($('#dm-sec').value)||0);
  if(nt<STEP)return;pushUndo();
  const diff=nt-av.totalDuration;const eq=$('#dm-eq').classList.contains('active');
  if(eq){const per=round(Math.floor(diff/av.slides.length));const rem=diff-per*av.slides.length;av.slides.forEach((s,i)=>{s.duration=Math.max(0,s.duration+per+(i===av.slides.length-1?rem:0))})}
  else{av.slides[av.slides.length-1].duration=Math.max(0,av.slides[av.slides.length-1].duration+diff)}
  av.totalDuration=nt;$('.overlay')?.remove();render();
};

// Expose needed functions
window.undo=undo;window.redo=redo;
window.setDur=setDur;window.addSlideAfter=addSlideAfter;window.addSlideEnd=addSlideEnd;window.rmSlide=rmSlide;
window.reorderSlide=reorderSlide;window.cloneVariant=cloneVariant;window.toggleHide=toggleHide;
window.startDivDrag=startDivDrag;window.state=state;
window.addSectionBreak=addSectionBreak;window.removeSectionBreak=removeSectionBreak;
window.setSectionDuration=setSectionDuration;window.renameSec=renameSec;
window.splitSection=splitSection;window.mergeSections=mergeSections;
window.toggleSlideLock=toggleSlideLock;window.toggleSectionLock=toggleSectionLock;
window.reorderSection=reorderSection;
window.round=round;window.parseT=parseT;
window.commitSecDur=(vid,secId,val)=>{setSectionDuration(vid,secId,round(parseT(val)))};
window.removeSectionBreakAt=(vid,slideIdx)=>{
  const v=state.curPlan.variants.find(x=>x.id===vid);if(!v)return;
  const secs=getSections(v);
  const sec=secs.find(s=>s.endIdx===slideIdx);
  if(sec)mergeSections(vid,sec.id);
};

// ─── INIT ───
initTips();
// Slide hover preview
let prevEl=null;
function initPreview(){
  prevEl=el('div','sl-preview');document.body.appendChild(prevEl);
  document.addEventListener('mouseover',e=>{
    const sl=e.target.closest('.sl[data-sid]');
    if(sl&&state.curPlan){
      const sid=sl.dataset.sid;const vid=sl.dataset.vid;
      const v=state.curPlan.variants.find(x=>x.id===vid);
      if(!v)return;
      const s=v.slides.find(x=>x.id===sid);
      if(!s||!s.thumb)return;
      const si=v.slides.indexOf(s);
      const r=sl.getBoundingClientRect();
      prevEl.innerHTML=`<img src="${s.thumb}" alt="Slide ${si+1}"><div class="sl-prev-title">${s.label||'Slide '+(si+1)}</div><div class="sl-prev-info">${fmtD(s.duration)}</div>`;
      prevEl.style.display='block';
      prevEl.style.left=Math.min(r.left,window.innerWidth-380)+'px';
      prevEl.style.top=Math.max(8,r.top-prevEl.offsetHeight-8)+'px';
    }else{
      if(prevEl)prevEl.style.display='none';
    }
  });
}
initPreview();
render();
</script>
